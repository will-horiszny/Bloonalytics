settings:
  sql_time_limit_ms: 13000
  allow_facet: false
  # max_returned_rows: 20000
static_mounts:
  - mount: static
    content: static/
extra_css_urls:
  - /static/custom.css
plugins:
  datasette-render-images:
    size_limit: 100000
  datasette-render-markdown:
    columns:
      - Profile
databases:
  s25+_matches:
    queries:
      win_loss_by_round:
        hide_sql: true
        title: Win/Loss Distribution by Round
        description: >-
          Select filters. Hero matches end of string (e.g. Jones, Biker), towers are substring based (Careful of Dart and Dartling). Then, click Show Plot. Choose Line (y), X=endRound, y=Games, and Stroke=Outcome.
        sql: |
          WITH RECURSIVE round_series(r) AS (
              -- Generates numbers 0 through 49
              SELECT 0
              UNION ALL
              SELECT r + 1 FROM round_series WHERE r < 49
          ),
          outcomes(Outcome) AS (
              SELECT 'Win' UNION ALL SELECT 'Loss'
          ),
          scaffold AS (
              -- Creates 100 rows: (0, Win), (0, Loss) ... (49, Win), (49, Loss)
              SELECT r as endRound, Outcome FROM round_series CROSS JOIN outcomes
          ),
          filtered_counts AS (
              -- Aggregate the data FIRST to make the final join tiny
              SELECT endRound, Outcome, COUNT(*) as Games
              FROM (
                  -- Matches where user is on Left
                  SELECT endRound, CASE WHEN playerLeftWin THEN 'Win' ELSE 'Loss' END AS Outcome
                  FROM matches
                  WHERE (:user_id = '' OR left_user_id = :user_id)
                    AND (:map = '' OR map LIKE '%' || :map || '%')
                    AND (:hero = '' OR lHero LIKE '%' || :hero)
                    AND (:t1 = '' OR (lt1 LIKE '%' || :t1 || '%' OR lt2 LIKE '%' || :t1 || '%' OR lt3 LIKE '%' || :t1 || '%'))
                    AND (:t2 = '' OR (lt1 LIKE '%' || :t2 || '%' OR lt2 LIKE '%' || :t2 || '%' OR lt3 LIKE '%' || :t2 || '%'))
                    AND (:t3 = '' OR (lt1 LIKE '%' || :t3 || '%' OR lt2 LIKE '%' || :t3 || '%' OR lt3 LIKE '%' || :t3 || '%'))
          
                  UNION ALL
          
                  -- Matches where user is on Right
                  SELECT endRound, CASE WHEN NOT playerLeftWin THEN 'Win' ELSE 'Loss' END AS Outcome
                  FROM matches
                  WHERE (:user_id = '' OR right_user_id = :user_id)
                    AND (:map = '' OR map LIKE '%' || :map || '%')
                    AND (:hero = '' OR rHero LIKE '%' || :hero)
                    AND (:t1 = '' OR (rt1 LIKE '%' || :t1 || '%' OR rt2 LIKE '%' || :t1 || '%' OR rt3 LIKE '%' || :t1 || '%'))
                    AND (:t2 = '' OR (rt1 LIKE '%' || :t2 || '%' OR rt2 LIKE '%' || :t2 || '%' OR rt3 LIKE '%' || :t2 || '%'))
                    AND (:t3 = '' OR (rt1 LIKE '%' || :t3 || '%' OR rt2 LIKE '%' || :t3 || '%' OR rt3 LIKE '%' || :t3 || '%'))
              ) sub
              GROUP BY endRound, Outcome
          )
          -- Combine scaffold with counts
          SELECT 
              s.endRound + 1 as endRound,
              COALESCE(fc.Games, 0) as Games,
              s.Outcome
          FROM scaffold s
          LEFT JOIN filtered_counts fc 
              ON s.endRound = fc.endRound 
              AND s.Outcome = fc.Outcome
          ORDER BY s.endRound ASC, s.Outcome DESC;

      winrate_by_round:
        hide_sql: true
        title: Winrate by Round
        description: >- 
          Select filters. Hero matches end of string (e.g. Jones, Biker), towers are substring based (Careful of Dart and Dartling). Then, click Show Plot. Choose Line (y), X=endRound, y=Value, and Stroke=Outcome.
        library: datasette-plot
        sql: |
          WITH player_matches AS (
            SELECT 
              m.endRound, m.map,
              CASE WHEN s.id = 0 THEN m.lHero ELSE m.rHero END AS Hero,
              CASE WHEN s.id = 0 THEN m.lt1 ELSE m.rt1 END AS T1,
              CASE WHEN s.id = 0 THEN m.lt2 ELSE m.rt2 END AS T2,
              CASE WHEN s.id = 0 THEN m.lt3 ELSE m.rt3 END AS T3,
              CASE WHEN s.id = 0 THEN m.playerLeftWin ELSE NOT m.playerLeftWin END AS isWin,
              CASE WHEN s.id = 0 THEN m.left_user_id ELSE m.right_user_id END AS user_id
            FROM matches m
            CROSS JOIN (SELECT 0 AS id UNION ALL SELECT 1) s
          ),
          filtered_matches AS (
            SELECT endRound, isWin
            FROM player_matches
            WHERE map LIKE '%' || :map || '%'
              AND Hero LIKE '%' || :hero
              AND (T1 LIKE '%' || :t1 || '%' OR T2 LIKE '%' || :t1 || '%' OR T3 LIKE '%' || :t1 || '%')
              AND (T1 LIKE '%' || :t2 || '%' OR T2 LIKE '%' || :t2 || '%' OR T3 LIKE '%' || :t2 || '%')
              AND (T1 LIKE '%' || :t3 || '%' OR T2 LIKE '%' || :t3 || '%' OR T3 LIKE '%' || :t3 || '%')
              AND (:user_id = '' OR user_id = :user_id)
          ),
          stats AS (
            SELECT 
              endRound,
              AVG(isWin) as win_rate
            FROM filtered_matches
            GROUP BY endRound
          )
          SELECT 
            stats.endRound + 1 as endRound,
            CASE WHEN labels.type = 'Winrate' THEN stats.win_rate ELSE 0.5 END AS value,
            labels.type AS series
          FROM stats
          CROSS JOIN (
            SELECT 'Winrate' AS type 
            UNION ALL 
            SELECT '50% Mark'
          ) labels
          ORDER BY endRound, series DESC

      counter_loadouts:
        hide_sql: true
        title: Counter Loadouts
        description: >-
          Enter a hero loadout to see which tower combinations statistically perform best against it!
        sql: |
          WITH IdentifiedCounters AS (
              SELECT 
                  CASE WHEN s.id = 0 THEN m.rHero ELSE m.lHero END AS Hero,
                  CASE WHEN s.id = 0 THEN m.rt1   ELSE m.lt1   END AS Tw1,
                  CASE WHEN s.id = 0 THEN m.rt2   ELSE m.lt2   END AS Tw2,
                  CASE WHEN s.id = 0 THEN m.rt3   ELSE m.lt3   END AS Tw3,
                  CASE WHEN s.id = 0 THEN NOT m.playerLeftWin ELSE m.playerLeftWin END AS WinAgainstInput
              FROM matches m
              CROSS JOIN (SELECT 0 AS id UNION ALL SELECT 1) s
              WHERE (:user_id = '' OR m.left_user_id = :user_id OR m.right_user_id = :user_id)
                AND (
                  (
                      s.id = 0 
                      AND m.lHero LIKE '%' || :hero || '%'
                      AND (m.lt1 LIKE '%' || :t1 || '%' OR m.lt2 LIKE '%' || :t1 || '%' OR m.lt3 LIKE '%' || :t1 || '%')
                      AND (m.lt1 LIKE '%' || :t2 || '%' OR m.lt2 LIKE '%' || :t2 || '%' OR m.lt3 LIKE '%' || :t2 || '%')
                      AND (m.lt1 LIKE '%' || :t3 || '%' OR m.lt2 LIKE '%' || :t3 || '%' OR m.lt3 LIKE '%' || :t3 || '%')
                  ) OR (
                      s.id = 1 
                      AND m.rHero LIKE '%' || :hero || '%'
                      AND (m.rt1 LIKE '%' || :t1 || '%' OR m.rt2 LIKE '%' || :t1 || '%' OR m.rt3 LIKE '%' || :t1 || '%')
                      AND (m.rt1 LIKE '%' || :t2 || '%' OR m.rt2 LIKE '%' || :t2 || '%' OR m.rt3 LIKE '%' || :t2 || '%')
                      AND (m.rt1 LIKE '%' || :t3 || '%' OR m.rt2 LIKE '%' || :t3 || '%' OR m.rt3 LIKE '%' || :t3 || '%')
                  )
              )
          ),
          Aggregated AS (
              SELECT 
                  Hero, Tw1, Tw2, Tw3,
                  COUNT(*) AS Games,
                  SUM(WinAgainstInput) AS Wins,
                  SUM(NOT WinAgainstInput) AS Losses,
                  CAST(SUM(WinAgainstInput) AS REAL) / COUNT(*) AS WR
              FROM IdentifiedCounters
              GROUP BY Hero, Tw1, Tw2, Tw3
              HAVING Wins >= 10 AND Losses >= 10
          ),
          mstats AS (
              SELECT COUNT(*) AS TotalMatches FROM matches
              WHERE (:user_id = '' OR left_user_id = :user_id OR right_user_id = :user_id)
          )
          SELECT 
              a.Hero,
              (a.Tw1 || ', ' || a.Tw2 || ', ' || a.Tw3) AS Loadout,
              'https://b2.kozow.com/static/' || a.Hero || '.png' AS H,
              'https://b2.kozow.com/static/' || a.Tw1 || '.png'   AS T1,
              'https://b2.kozow.com/static/' || a.Tw2 || '.png'   AS T2,
              'https://b2.kozow.com/static/' || a.Tw3 || '.png'   AS T3,
              a.Games,
              printf('%.2f%%', a.WR * 100) AS Winrate,
              printf('%.2f%%', (CAST(a.Games AS REAL) / (mstats.TotalMatches * 2)) * 100) AS Pickrate,
              printf('%.2f%%', (a.WR - 1.96 * SQRT((a.WR * (1.0 - a.WR)) / a.Games)) * 100) AS Winrate_LowerBound_95CI
          FROM Aggregated a, mstats
          WHERE LENGTH(Winrate_LowerBound_95CI) = 6
          ORDER BY Winrate_LowerBound_95CI DESC
      loadout_experts:
        hide_sql: true
        title: Loadout Experts
        description: >-
            Find the top-performing players for a specific loadout.
        sql: |
            WITH PlayerGames AS (
                -- Unpivot matches to look at each player's performance individually
                SELECT 
                    CASE WHEN s.id = 0 THEN m.left_user_id ELSE m.right_user_id END AS user_id,
                    CASE WHEN s.id = 0 THEN m.lHero ELSE m.rHero END AS Hero,
                    CASE WHEN s.id = 0 THEN m.lt1 ELSE m.rt1 END AS T1,
                    CASE WHEN s.id = 0 THEN m.lt2 ELSE m.rt2 END AS T2,
                    CASE WHEN s.id = 0 THEN m.lt3 ELSE m.rt3 END AS T3,
                    CASE 
                        WHEN s.id = 0 AND m.playerLeftWin = 1 THEN 1
                        WHEN s.id = 1 AND m.playerLeftWin = 0 THEN 1
                        ELSE 0 
                    END AS Won
                FROM matches m
                CROSS JOIN (SELECT 0 AS id UNION ALL SELECT 1) s
            ),
            FilteredMatches AS (
                -- Filter by loadout requirements
                SELECT user_id, Won
                FROM PlayerGames
                WHERE user_id IS NOT NULL
                -- Hero must match the end of the string
                AND Hero LIKE '%' || :hero
                -- Each tower must be present in one of the three slots
                AND (T1 LIKE '%' || :t1 || '%' OR T2 LIKE '%' || :t1 || '%' OR T3 LIKE '%' || :t1 || '%')
                AND (T1 LIKE '%' || :t2 || '%' OR T2 LIKE '%' || :t2 || '%' OR T3 LIKE '%' || :t2 || '%')
                AND (T1 LIKE '%' || :t3 || '%' OR T2 LIKE '%' || :t3 || '%' OR T3 LIKE '%' || :t3 || '%')
            ),
            ExpertAggregates AS (
                SELECT 
                    user_id,
                    COUNT(*) AS Games,
                    SUM(Won) AS Wins,
                    (COUNT(*) - SUM(Won)) AS Losses,
                    CAST(SUM(Won) AS REAL) / COUNT(*) AS WR
                FROM FilteredMatches
                GROUP BY user_id
                -- Enforce the 10-win, 10-loss minimum
                HAVING Wins >= 10 AND Losses >= 10
            )
                SELECT 
                   json_object(
                  'label',
                  'B2.LOL',
                  'href',
                  'https://b2.lol/playerInfo/playerInfo.html?' || user_id
                ) as Profile,
                user_id,
                Games,
                Wins,
                Losses,
                printf('%.2f%%', WR * 100) AS [Raw Winrate],
                -- Calculate the 95% Confidence Interval Lower Bound
                printf('%.2f%%', (WR - 1.96 * SQRT((WR * (1.0 - WR)) / Games)) * 100) AS [Winrate_LowerBound_95CI]
            FROM ExpertAggregates
            -- Order by the Lower Bound to see the most reliable experts first
            ORDER BY (WR - 1.96 * SQRT((WR * (1.0 - WR)) / Games)) DESC

